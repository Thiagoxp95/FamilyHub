model_name: "hey_james"
target_phrase:
  - "hey james"
# Adversarial near-misses we specifically must NOT wake on (selftest negatives).
custom_negative_phrases:
  - "hey jason"
  - "hey james bond"
  - "hey can you hear me"
  - "james"
  - "hey play a game"
  - "the name is john"
n_samples: 20000
n_samples_val: 2000
tts_batch_size: 50
augmentation_batch_size: 16
piper_sample_generator_path: "./piper-sample-generator"
output_dir: "./my_custom_model"
rir_paths:
  - "./data/rir/16khz"
background_paths:
  - "./data/background/esc50_16k"
background_paths_duplication_rate:
  - 1
false_positive_validation_data_path: "./data/features/validation_set_features.npy"
augmentation_rounds: 1
feature_data_files:
  "ACAV100M_sample": "./data/features/openwakeword_features_ACAV100M_2000_hrs_16bit.npy"
batch_n_per_class:
  "ACAV100M_sample": 1024
  "adversarial_negative": 50
  "positive": 50
model_type: "dnn"
layer_size: 32
steps: 50000
max_negative_weight: 1500
target_false_positives_per_hour: 0.2
